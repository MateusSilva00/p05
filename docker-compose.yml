services:
  node_1:
    build: .
    container_name: node_1
    hostname: node_1
    environment:
      - NODE_NAME=node_1
      - RAFT_DATA_DIR=/app/data
    volumes:
      - ./data/node_1:/app/data
    networks:
      - raft-net

  node_2:
    build: .
    container_name: node_2
    hostname: node_2
    environment:
      - NODE_NAME=node_2
      - RAFT_DATA_DIR=/app/data
    volumes:
      - ./data/node_2:/app/data
    networks:
      - raft-net

  node_3:
    build: .
    container_name: node_3
    hostname: node_3
    environment:
      - NODE_NAME=node_3
      - RAFT_DATA_DIR=/app/data
    volumes:
      - ./data/node_3:/app/data
    networks:
      - raft-net

  node_4:
    build: .
    container_name: node_4
    hostname: node_4
    environment:
      - NODE_NAME=node_4
      - RAFT_DATA_DIR=/app/data
    volumes:
      - ./data/node_4:/app/data
    networks:
      - raft-net

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: client
    depends_on:
      - node_1
      - node_2
      - node_3
      - node_4
    networks:
      - raft-net
    stdin_open: true
    tty: true

networks:
  raft-net:
    driver: bridge
